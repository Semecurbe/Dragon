{% extends "base.html" %}
{% block title %}Dragon — Chat{% endblock %}
{% block content %}
<p style="font-size:.9em;color:{{ status_color }}" class="mb-2">● {{ status_msg }}</p>

<div id="chat-box"></div>
<div id="refs-box"></div>

<details class="mt-2 mb-2" style="font-size:.82em;color:#8b949e">
  <summary style="cursor:pointer">🔎 Translated queries</summary>
  <div id="queries-box" class="mt-1"></div>
</details>

<!-- RAG Filter -->
<div class="d-flex align-items-center gap-2 mt-2 mb-1">
  <label class="small mb-0" style="color:#8b949e;white-space:nowrap">🔍 Filter:</label>
  <select id="filter-select" class="form-select form-select-sm"
          style="max-width:260px;background:#21262d;color:#e6edf3;border-color:#30363d">
    <option value="">All documents</option>
  </select>
  <span id="filter-badge" class="badge bg-secondary d-none" style="font-size:.7em"></span>
</div>

<div class="d-flex gap-2 mt-1">
  <input id="msg-input" type="text" class="form-control"
         placeholder="Ask a question about your documents…"
         onkeydown="if(event.key==='Enter')sendMsg()">
  <button class="btn btn-primary d-flex align-items-center gap-2" onclick="sendMsg()" id="send-btn">
    Send
  </button>
  <button class="btn btn-outline-secondary" onclick="clearChat()" title="Clear conversation">🗑️</button>
  <button class="btn btn-outline-secondary" onclick="downloadQmd()" id="dl-btn" title="Download conversation as .qmd">📥 .qmd</button>
</div>

<details class="mt-3" style="font-size:.85em">
  <summary style="cursor:pointer">📎 Add a document to the conversation</summary>
  <div class="mt-2">
    <input type="file" id="file-input" class="form-control"
           accept=".pdf,.docx,.pptx,.html,.md,.xlsx">
    <div id="file-status" class="mt-1 text-muted small"></div>
    <button class="btn btn-sm btn-outline-secondary mt-1" onclick="removeFile()">✖ Remove</button>
  </div>
</details>
{% endblock %}

{% block scripts %}
<script>
{% raw %}
let chatHistory = [];
let chatRefs    = [];   // refs HTML per assistant turn
let uploadedDoc  = "";

// ── Load saved filters into the selector ─────────────────────────────────────
(async function loadFilters() {
  const d = await fetch('/api/filters').then(r => r.json());
  const sel = document.getElementById('filter-select');
  Object.entries(d.filters || {}).forEach(([name, sources]) => {
    const opt = document.createElement('option');
    opt.value = JSON.stringify(sources);
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    const badge = document.getElementById('filter-badge');
    if (sel.value) {
      const srcs = JSON.parse(sel.value);
      badge.textContent = srcs.length + ' doc' + (srcs.length > 1 ? 's' : '');
      badge.classList.remove('d-none');
    } else {
      badge.classList.add('d-none');
    }
  });
})();

// File upload
document.getElementById('file-input').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  document.getElementById('file-status').textContent = 'Processing…';
  const r = await fetch('/api/upload', {method:'POST', body:fd});
  const d = await r.json();
  document.getElementById('file-status').textContent = d.status;
  uploadedDoc = d.text || "";
});

function removeFile() {
  document.getElementById('file-input').value = '';
  document.getElementById('file-status').textContent = '';
  uploadedDoc = '';
}

async function sendMsg() {
  const input   = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  addMsg('user', msg);
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner-border" role="status"></span> Sending…';

  const filterVal    = document.getElementById('filter-select').value;
  const filterSources = filterVal ? JSON.parse(filterVal) : [];

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        message: msg, history: chatHistory,
        uploaded_doc: uploadedDoc, filter_sources: filterSources,
      })
    });
    const d = await r.json();
    chatHistory.push({role:'user',      content: msg});
    chatHistory.push({role:'assistant', content: d.answer});
    chatRefs.push(d.refs || '');
    addMsg('assistant', d.answer);
    document.getElementById('refs-box').innerHTML    = d.refs    || '';
    document.getElementById('queries-box').innerHTML = d.translations || '';
  } catch(e) {
    addMsg('assistant', '⚠️ Request error: ' + e);
  } finally {
    sendBtn.disabled = false;
    sendBtn.innerHTML = 'Send';
  }
}

function addMsg(role, text) {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = role === 'user' ? 'msg-user' : 'msg-bot';
  if (role === 'assistant') {
    div.innerHTML = marked.parse(text);
  } else {
    div.textContent = text;
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function clearChat() {
  chatHistory = [];
  chatRefs    = [];
  document.getElementById('chat-box').innerHTML    = '';
  document.getElementById('refs-box').innerHTML    = '';
  document.getElementById('queries-box').innerHTML = '';
}

// ── QMD export ────────────────────────────────────────────────────────────
function refsToMarkdown(html) {
  if (!html) return '';
  const parser = new DOMParser();
  const doc    = parser.parseFromString(html, 'text/html');
  const links  = doc.querySelectorAll('a');
  if (!links.length) return '';
  let md = '\n### References\n\n';
  links.forEach(a => {
    md += `- [${a.textContent.trim()}](${a.getAttribute('href')})\n`;
  });
  return md;
}

function downloadQmd() {
  if (!chatHistory.length) {
    alert('No conversation to export yet.');
    return;
  }
  const dateStr = new Date().toISOString().split('T')[0];
  let qmd = `---\ntitle: "Chat Export — ${dateStr}"\ndate: "${dateStr}"\n---\n\n`;

  let refsIdx = 0;
  chatHistory.forEach(msg => {
    if (msg.role === 'user') {
      qmd += `## Question\n\n${msg.content}\n\n`;
    } else {
      qmd += `## Answer\n\n${msg.content}\n`;
      const refs = chatRefs[refsIdx++];
      if (refs) qmd += refsToMarkdown(refs) + '\n';
      qmd += '\n---\n\n';
    }
  });

  const blob = new Blob([qmd], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `chat-${dateStr}.qmd`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Brief visual feedback on the button
  const btn = document.getElementById('dl-btn');
  const orig = btn.textContent;
  btn.textContent = '✔ Downloaded';
  setTimeout(() => btn.textContent = orig, 2000);
}
{% endraw %}
</script>
{% endblock %}
