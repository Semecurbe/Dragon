<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dragon — First-time setup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/dragon-favicon.svg">
  <style>
    body { background:#0d1117; color:#e6edf3; font-family:'Segoe UI',system-ui,sans-serif; }
    .setup-card {
      background:#161b22; border:1px solid #30363d; border-radius:12px;
      padding:2rem 2.4rem; max-width:420px; width:100%; margin:auto;
    }
    .form-control { background:#0d1117; color:#e6edf3; border-color:#30363d; }
    .form-control:focus { background:#0d1117; color:#e6edf3; border-color:#1f6feb; box-shadow:0 0 0 3px rgba(31,111,235,.25); }
    .form-control::placeholder { color:#484f58; }
    .form-label { color:#8b949e; font-size:.85em; }
  </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh;padding:2rem">
  <div class="setup-card">
    <div class="text-center mb-4">
      <img src="/static/dragon-navbar.svg" alt="Dragon" height="44" class="mb-3">
      <h6 class="mb-1">Welcome to Dragon</h6>
      <p class="text-muted small mb-0">Create your administrator account to get started.</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               autofocus autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password <span class="text-muted">(min. 6 characters)</span></label>
        <input type="password" id="password" name="password" class="form-control"
               autocomplete="new-password" required minlength="6">
      </div>
      <div class="mb-4">
        <label class="form-label" for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2" class="form-control"
               autocomplete="new-password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-100">Create account &amp; sign in</button>
    </form>
  </div>
</div>
</body>
</html>
